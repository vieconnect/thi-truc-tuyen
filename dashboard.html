    <script language="JavaScript">
    window.onload = function() {
        document.addEventListener("contextmenu", function(e) {
            e.preventDefault();
        }, false);
        document.addEventListener("keydown", function(e) {
            //document.onkeydown = function(e) {
            // "I" key
            if (e.ctrlKey && e.shiftKey && e.keyCode == 73) {
                disabledEvent(e);
            }
            // "J" key
            if (e.ctrlKey && e.shiftKey && e.keyCode == 74) {
                disabledEvent(e);
            }
            // "S" key + macOS
            if (e.keyCode == 83 && (navigator.platform.match("Mac") ? e.metaKey : e.ctrlKey)) {
                disabledEvent(e);
            }
            // "U" key
            if (e.ctrlKey && e.keyCode == 85) {
                disabledEvent(e);
            }
            // "F12" key
            if (event.keyCode == 123) {
                disabledEvent(e);
            }
        }, false);
 
        function disabledEvent(e) {
            if (e.stopPropagation) {
                e.stopPropagation();
            } else if (window.event) {
                window.event.cancelBubble = true;
            }
            e.preventDefault();
            return false;
        }
    };
</script>

    <script>
       document.addEventListener('DOMContentLoaded', () => {
    updateExamRoomUI(); 
    loadRealtimeUserList(); // Chạy danh sách quản lý thành viên
    document.getElementById('logoutButton').addEventListener('click', logout);
});

function updateExamRoomUI() {
    const currentUser = JSON.parse(localStorage.getItem('currentUser'));
    if (currentUser) {
        if(document.getElementById('userNameDisplay')) document.getElementById('userNameDisplay').textContent = currentUser.name;
        if(document.getElementById('userSBDDisplay')) document.getElementById('userSBDDisplay').textContent = currentUser.sbd;
        if(document.getElementById('userBirthdayDisplay')) document.getElementById('userBirthdayDisplay').textContent = currentUser.birthday;
        if(document.getElementById('userClassDisplay')) document.getElementById('userClassDisplay').textContent = currentUser.class;
        if(document.getElementById('welcomeMessage')) document.getElementById('welcomeMessage').textContent = `Xin chào, ${currentUser.name}!`;
    }
}

document.addEventListener('DOMContentLoaded', () => {
    const currentUser = JSON.parse(localStorage.getItem('currentUser'));
    if (!currentUser) {
        window.location.replace('index.html');
        return;
    }
    document.getElementById('welcomeMessage').innerText = `Thí sinh: ${currentUser.name}`;
    renderAvailableExams();
});


// Lắng nghe Realtime toàn bộ danh sách users từ Firebase và sinh nút Khóa/Mở khóa
function loadRealtimeUserList() {
    database.ref('users').on('value', (snapshot) => {
        const users = snapshot.val();
        const tbody = document.getElementById('adminUserTableBody');
        if (!tbody) return;
        tbody.innerHTML = '';

        for (let username in users) {
            const user = users[username];
            const isLocked = user.isLocked || false;
            
            const row = `
                <tr>
                    <td>${user.sbd || '---'}</td>
                    <td><strong>${user.name || 'N/A'}</strong></td>
                    <td>${user.email || username}</td>
                    <td>${user.class || '---'}</td>
                    <td>
                        <span class="badge ${isLocked ? 'bg-danger' : 'bg-success'}">
                            ${isLocked ? 'Bị khóa' : 'Đang hoạt động'}
                        </span>
                    </td>
                    <td>
                        <button class="btn btn-sm ${isLocked ? 'btn-warning' : 'btn-outline-danger'}" 
                                onclick="toggleLockUser('${username}', ${isLocked}, '${user.name}')">
                            ${isLocked ? '🔓 Mở khóa' : '🔒 Khóa TK'}
                        </button>
                    </td>
                </tr>
            `;
            tbody.insertAdjacentHTML('beforeend', row);
        }
    });
}

// Hàm cập nhật trực tiếp thuộc tính isLocked lên Database Firebase
async function toggleLockUser(username, currentStatus, fullName) {
    const nextStatus = !currentStatus;
    const confirmMsg = nextStatus ? `Bạn có chắc chắn muốn KHÓA tài khoản ${fullName}?` : `Mở khóa cho ${fullName}?`;
    
    if (confirm(confirmMsg)) {
        const lockInfo = nextStatus ? {
            id: "LOCK-" + Math.floor(100, Math.random()*900),
            name: fullName,
            reason: "Chủ tịch/Quản trị viên yêu cầu tạm khóa dữ liệu",
            startTime: new Date().toLocaleString(),
            duration: "Cho đến khi có thông báo mới"
        } : null;

        await database.ref('users/' + username + '/isLocked').set(nextStatus);
        await database.ref('users/' + username + '/lockInfo').set(lockInfo);
    }
}
