<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Lý Phản Hồi | Admin Control</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f6f9; font-family: 'Segoe UI', system-ui, sans-serif; }
        .feedback-item { cursor: pointer; transition: all 0.2s; }
        .feedback-item:hover { background-color: #e9ecef !important; }
        .feedback-item.active-item { background-color: #cfe2ff !important; border-left: 4px solid #0d6efd; }
        .detail-card { position: sticky; top: 20px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4 bg-white p-3 rounded shadow-sm">
        <div class="d-flex align-items-center gap-3">
            <a href="admin-users.html" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i> Quay lại</a>
            <h4 class="mb-0 fw-bold text-dark"><i class="bi bi-envelope-paper-fill text-primary me-2"></i>DANH SÁCH PHẢN HỒI & BÁO LỖI</h4>
        </div>
        <div class="text-muted small">Quyền hạn: Hội đồng Quản trị viên</div>
    </div>

    <div class="row">
        <div class="col-lg-6 mb-4">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white py-3 fw-bold text-secondary">
                    Hộp thư phản hồi hệ thống
                </div>
                <div class="table-responsive" style="max-height: 75vh; overflow-y: auto;">
                    <table class="table table-striped align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Người gửi</th>
                                <th>Thời gian</th>
                                <th>Trạng thái</th>
                            </tr>
                        </thead>
                        <tbody id="feedbackTableBody">
                            <tr>
                                <td colspan="3" class="text-center py-4 text-muted">
                                    <div class="spinner-border spinner-border-sm text-primary me-2"></div> Đang tải dữ liệu phản hồi...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-lg-6">
            <div class="card border-0 shadow-sm detail-card bg-white p-4" id="detailContainer">
                <div class="text-center py-5 text-muted">
                    <i class="bi bi-envelope-open" style="font-size: 3rem;"></i>
                    <p class="mt-2">Chọn một phản hồi ở danh sách bên trái để xem nội dung chi tiết phòng máy.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="auth.js"></script> <script>
let allFeedbacks = {};
    
document.addEventListener("DOMContentLoaded", function() {
    loadFeedbackList();
});

    window.onload = function() {
    if (typeof checkAdminAccess === 'function') {
        const hasAccess = checkAdminAccess();
        if (!hasAccess) return;
    }
}

// Hàm đọc danh sách phản hồi theo thời gian thực từ Database
function loadFeedbackList() {
    const dbRef = firebase.database().ref('feedbacks');
    dbRef.on('value', (snapshot) => {
        const tbody = document.getElementById('feedbackTableBody');
        allFeedbacks = snapshot.val() || {};
        
        if (Object.keys(allFeedbacks).length === 0) {
            tbody.innerHTML = `<tr><td colspan="3" class="text-center py-4 text-muted">Chưa có ý kiến phản hồi nào được gửi.</td></tr>`;
            return;
        }

        let html = '';
        // Đảo ngược thứ tự hiển thị để phản hồi mới nhất lên trên đầu
        Object.keys(allFeedbacks).reverse().forEach(key => {
            const item = allFeedbacks[key];
            const statusClass = item.status === "Đã xử lý" ? "bg-success" : "bg-warning text-dark";
            
            html += `
                <tr class="feedback-item" id="row-${key}" onclick="viewFeedbackDetail('${key}')">
                    <td>
                        <div class="fw-bold text-dark">${item.name}</div>
                        <div class="small text-muted" style="font-size:0.8rem;">${item.contact}</div>
                    </td>
                    <td class="small text-muted">${item.time}</td>
                    <td><span class="badge ${statusClass}">${item.status || 'Chưa xử lý'}</span></td>
                </tr>
            `;
        });
        tbody.innerHTML = html;
    });
}

// Hàm bấm vào từng hàng để hiển thị chi tiết nội dung văn bản bên vế phải
function viewFeedbackDetail(key) {
    // Đánh dấu dòng đang chọn sáng lên
    document.querySelectorAll('.feedback-item').forEach(el => el.classList.remove('active-item'));
    document.getElementById(`row-${key}`).classList.add('active-item');

    const item = allFeedbacks[key];
    const detailContainer = document.getElementById('detailContainer');

    const selectHtml = item.status === "Đã xử lý" 
        ? `<option value="Chưa xử lý">Chưa xử lý</option><option value="Đã xử lý" selected>Đã xử lý (Hoàn tất)</option>`
        : `<option value="Chưa xử lý" selected>Chưa xử lý (Mới)</option><option value="Đã xử lý">Đã xử lý (Hoàn tất)</option>`;

    detailContainer.innerHTML = `
        <div class="d-flex justify-content-between align-items-start border-bottom pb-3 mb-3">
            <div>
                <h5 class="fw-bold text-primary mb-1">${item.name}</h5>
                <div class="text-muted small"><i class="bi bi-telephone-outbound me-1"></i> Liên hệ: <strong>${item.contact}</strong></div>
            </div>
            <span class="text-muted small">${item.time}</span>
        </div>

        <div class="mb-4">
            <label class="form-label text-secondary small fw-bold text-uppercase">Nội dung phản ánh:</label>
            <div class="p-3 bg-light rounded text-dark border" style="white-space: pre-wrap; line-height: 1.6;">${item.content}</div>
        </div>

        <div class="row align-items-center bg-light p-3 rounded border g-2">
            <div class="col-sm-6">
                <label class="form-label small fw-bold text-muted mb-1">Cập nhật trạng thái xử lý:</label>
                <select class="form-select form-select-sm" id="updateStatusSelect" onchange="updateStatus('${key}', this.value)">
                    ${selectHtml}
                </select>
            </div>
            <div class="col-sm-6 text-sm-end mt-3 mt-sm-0">
                <button class="btn btn-outline-danger btn-sm" onclick="deleteFeedback('${key}')">
                    <i class="bi bi-trash3-fill"></i> Xóa phản hồi này
                </button>
            </div>
        </div>
    `;
}

// Cập nhật trạng thái duyệt/xử lý
function updateStatus(key, newStatus) {
    firebase.database().ref(`feedbacks/${key}`).update({ status: newStatus })
    .then(() => {
        // Cập nhật giao diện lập tức không cần tải lại trang
        allFeedbacks[key].status = newStatus;
    });
}

// Xóa vĩnh viễn phản hồi lỗi thời
function deleteFeedback(key) {
    if (confirm("Bạn có chắc chắn muốn xóa phản hồi này khỏi hệ thống cơ sở dữ liệu?")) {
        firebase.database().ref(`feedbacks/${key}`).remove()
        .then(() => {
            document.getElementById('detailContainer').innerHTML = `
                <div class="text-center py-5 text-muted">
                    <i class="bi bi-envelope-open" style="font-size: 3rem;"></i>
                    <p class="mt-2">Đã xóa thành công dữ liệu. Chọn một phản hồi khác để xem chi tiết.</p>
                </div>
            `;
        });
    }
}
</script>
</body>
</html>
