<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống thi trực tuyến</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .exam-monitor-box {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 180px;
            height: 135px;
            background: #222;
            border: 3px solid #dc3545;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            z-index: 9999;
            overflow: hidden;
            display: none;
        }
        .exam-monitor-box video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .monitor-badge {
            position: absolute;
            top: 5px;
            left: 5px;
            font-size: 10px;
            padding: 2px 6px;
            background: rgba(220, 53, 69, 0.85);
            color: white;
            border-radius: 4px;
            font-weight: bold;
        }
        .monitor-static-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffc107;
            font-size: 11px;
            font-weight: bold;
            text-align: center;
            padding: 10px;
            text-transform: uppercase;
        }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">VieEdu</a>
    <div class="navbar-nav ms-auto">
        <span class="nav-link text-white me-3" id="welcomeMessage"></span>
        <a class="btn btn-sm btn-outline-light" href="dashboard.html">Về Dashboard</a>
    </div>
  </div>
</nav>

<div class="container mt-5">
    <div class="row">
        <div class="col-md-5">
            <div class="card p-4 shadow-sm mb-4">
                <h4 class="fw-bold text-primary mb-3">Danh sách Đề Thi được giao</h4>
                <div id="examListContainer" class="list-group">
                    <div class="text-center p-3 text-muted">Đang tìm kiếm bài thi được chỉ định...</div>
                </div>
            </div>
        </div>
        
        <div class="col-md-7">
            <div id="quizWorkspace" class="card p-4 shadow-sm" style="display: none;">
                <h4 id="workspaceTitle" class="fw-bold text-success mb-2">Tên bài thi</h4>
                <p class="text-muted small">Thời gian: <span id="workspaceTime"></span> | Hạn chót: <span id="workspaceExpired"></span></p>
                <hr>
                <div id="questionsContainer"></div>
                <button class="btn btn-success w-100 mt-3" onclick="submitExam()">Nộp bài và lưu kết quả</button>
            </div>
            <div id="quizNotice" class="text-center p-5 text-muted border bg-white rounded">
                <h5>Chọn một đề thi ở danh sách bên trái để bắt đầu làm bài.</h5>
            </div>
        </div>
    </div>
</div>

<div class="exam-monitor-box" id="cameraMonitorBox">
    <span class="monitor-badge">● SCREEN LIVE</span>
    <div class="monitor-static-placeholder bg-dark">
        <span>Hệ thống đang<br>giám sát cửa sổ...</span>
    </div>
    <video id="monitorCameraVideo" autoplay muted playsinline style="display: none;"></video>
</div>
<canvas id="monitorCanvas" style="display: none;"></canvas>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="auth.js"></script>

<script>
let activeExam = null; 
let isExamInProgress = false;
let screenViolationCount = 0;

document.addEventListener('DOMContentLoaded', () => {
    const currentUser = JSON.parse(localStorage.getItem('currentUser'));
    if (!currentUser) {
        window.location.replace('index.html');
        return;
    }
    document.getElementById('welcomeMessage').innerText = `Thí sinh: ${currentUser.name}`;
    renderAssignedExams();
});

// SỬA LỖI CHÍNH XÁC: Đọc thông tin đề thi gốc từ nhánh `exams` theo đúng file JSON của bạn
async function renderAssignedExams() {
    const currentUser = JSON.parse(localStorage.getItem('currentUser'));
    const container = document.getElementById('examListContainer');
    container.innerHTML = '';
    
    try {
        // Lấy danh sách ID đề thi được gán từ users/username/assignedExams
        const userAssignedSnapshot = await database.ref(`users/${currentUser.username}/assignedExams`).once('value');
        const userAssignedExams = userAssignedSnapshot.val() || {};
        const examIds = Object.keys(userAssignedExams);

        if (examIds.length === 0) {
            container.innerHTML = '<div class="text-center p-3 text-muted">Bạn chưa được giao bài thi nào!</div>';
            return;
        }

        for (const examId of examIds) {
            const userExamState = userAssignedExams[examId];
            // Kiểm tra trạng thái đã hoàn thành làm bài hay chưa
            const hasDone = userExamState && (userExamState.status === "Đã hoàn thành" || userExamState.submitTime !== undefined);

            // ĐÃ SỬA: Thay đổi đường dẫn trỏ chính xác vào nhánh `exams` gốc từ database của bạn
            const globalExamSnapshot = await database.ref(`exams/${examId}`).once('value');
            const globalExamData = globalExamSnapshot.val();

            if (!globalExamData) continue; 

            let btnHtml = '';
            if (hasDone) {
                btnHtml = `<span class="badge bg-danger mt-2 p-2 d-inline-block">Đã hoàn thành</span>`;
            } else {
                btnHtml = `<button class="btn btn-sm btn-primary mt-2" onclick="startExam('${examId}')">Bắt đầu làm bài</button>`;
            }

            const itemHtml = `
                <div class="list-group-item list-group-item-action p-3 mb-2 border rounded">
                    <div class="d-flex w-100 justify-content-between align-items-center">
                        <h6 class="mb-1 fw-bold text-dark">${globalExamData.subject || 'Môn thi không tên'}</h6>
                        <small class="badge bg-secondary text-light">${examId}</small>
                    </div>
                    <p class="mb-1 text-muted small">Thời gian làm bài: ${globalExamData.time || 'Không giới hạn'}</p>
                    ${btnHtml}
                </div>
            `;
            container.insertAdjacentHTML('beforeend', itemHtml);
        }
        
        if(container.innerHTML === '') {
            container.innerHTML = '<div class="text-center p-3 text-danger">Không tìm thấy nội dung tương ứng với mã đề được giao!</div>';
        }
    } catch (error) {
        container.innerHTML = '<div class="text-center p-3 text-danger">Lỗi kết nối dữ liệu!</div>';
    }
}

// SỬA LỖI CHÍNH XÁC: Lấy mảng câu hỏi từ đúng nhánh `exams` khi thí sinh bấm làm bài
async function startExam(examId) {
    const currentUser = JSON.parse(localStorage.getItem('currentUser'));
    
    try {
        // ĐÃ SỬA: Thay đổi đường dẫn trỏ chính xác vào nhánh `exams` gốc để lấy questions
        const examSnapshot = await database.ref(`exams/${examId}`).once('value');
        const examData = examSnapshot.val();

        if (!examData) {
            alert("Mã đề thi này không tồn tại trên hệ thống!");
            return;
        }

        activeExam = {
            id: examId,
            subject: examData.subject,
            time: examData.time || "Không giới hạn",
            expired: examData.expired,
            questions: examData.questions || {}
        };

        screenViolationCount = 0;

        await database.ref('users/' + currentUser.username).update({ 
            examStatus: "Đang làm bài",
            screenViolations: 0
        });
        
        await database.ref(`users/${currentUser.username}/assignedExams/${examId}`).update({
            status: "Đang làm bài"
        });
        
        await database.ref(`users/${currentUser.username}/violationLogs`).remove();

        document.getElementById('cameraMonitorBox').style.display = 'block';
        document.getElementById('quizNotice').style.display = 'none';
        document.getElementById('quizWorkspace').style.display = 'block';
        
        document.getElementById('workspaceTitle').innerText = activeExam.subject;
        document.getElementById('workspaceTime').innerText = activeExam.time;
        document.getElementById('workspaceExpired').innerText = activeExam.expired || "Không giới hạn";

        renderQuestions(activeExam.questions);
        startScreenWindowTracker();
    } catch (error) {
        alert("Lỗi tải đề thi: " + error.message);
    }
}

function startScreenWindowTracker() {
    isExamInProgress = true;
    document.addEventListener('visibilitychange', handleVisibilityViolation);
    window.addEventListener('blur', handleBlurViolation);
}

function stopScreenWindowTracker() {
    isExamInProgress = false;
    document.removeEventListener('visibilitychange', handleVisibilityViolation);
    window.removeEventListener('blur', handleBlurViolation);
    document.getElementById('cameraMonitorBox').style.display = 'none';
}

function handleVisibilityViolation() {
    if (document.visibilityState === 'hidden' && isExamInProgress) {
        processViolationCommit("Thí sinh rời khỏi tab làm bài");
    }
}

function handleBlurViolation() {
    if (isExamInProgress) {
        processViolationCommit("Thí sinh mở cửa sổ khác đè lên màn hình thi");
    }
}

async function processViolationCommit(reason) {
    if (!activeExam) return;
    const currentUser = JSON.parse(localStorage.getItem('currentUser'));
    if (!currentUser) return;

    screenViolationCount++;
    const timeStr = new Date().toLocaleString('vi-VN');

    try {
        await database.ref(`users/${currentUser.username}/screenViolations`).set(screenViolationCount);
        await database.ref(`users/${currentUser.username}/violationLogs`).push({
            violationIndex: screenViolationCount,
            reason: reason,
            time: timeStr
        });
    } catch (err) {
        console.error("Lỗi ghi nhận vi phạm:", err);
    }
}

function renderQuestions(questions) {
    const container = document.getElementById('questionsContainer');
    container.innerHTML = '';
    
    const qIds = Object.keys(questions);
    if (qIds.length === 0) {
        container.innerHTML = '<p class="text-danger">Đề thi chưa được cấu hình câu hỏi.</p>';
        return;
    }

    let index = 1;
    qIds.forEach(qId => {
        const qData = questions[qId];
        let optionsHtml = '';
        
        if (qData.options) {
            Object.keys(qData.options).forEach(optKey => {
                optionsHtml += `
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="radio" name="${qId}" id="${qId}_${optKey}" value="${optKey}">
                        <label class="form-check-label" for="${qId}_${optKey}">
                            <strong>${optKey}.</strong> ${qData.options[optKey]}
                        </label>
                    </div>
                `;
            });
        }

        const qHtml = `
            <div class="mb-4 p-3 border-bottom rounded bg-white">
                <p class="fw-bold">Câu ${index}: ${qData.title}</p>
                <div class="options-group">${optionsHtml}</div>
            </div>
        `;
        container.insertAdjacentHTML('beforeend', qHtml);
        index++;
    });
}

async function submitExam() {
    if (!activeExam) return;
    const currentUser = JSON.parse(localStorage.getItem('currentUser'));
    const username = currentUser.username;
    
    let selectedAnswers = {};
    document.querySelectorAll('#questionsContainer input[type="radio"]:checked').forEach(elem => {
        selectedAnswers[elem.name] = elem.value;
    });

    try {
        stopScreenWindowTracker(); 

        let totalQuestions = Object.keys(activeExam.questions).length;
        let correctCount = 0;

        if (totalQuestions > 0) {
            for (let qId in activeExam.questions) {
                const correctAnswer = activeExam.questions[qId].correctAnswer;
                if (selectedAnswers[qId] && selectedAnswers[qId] === correctAnswer) {
                    correctCount++;
                }
            }
        }
        
        let calculatedScore = totalQuestions > 0 ? (correctCount / totalQuestions) * 10 : 0;
        calculatedScore = Math.round(calculatedScore * 100) / 100;

        const resultPayload = {
            status: "Đã hoàn thành",
            submitTime: new Date().toLocaleString('vi-VN'),
            autoScore: calculatedScore,
            finalScore: calculatedScore,
            selectedAnswers: selectedAnswers,
            screenViolations: screenViolationCount,
            isPublished: false 
        };

        await database.ref('users/' + username).update({ examStatus: "Đã nộp bài" });
        
        await database.ref(`users/${username}/assignedExams/${activeExam.id}`).update(resultPayload);

        const histSnap = await database.ref(`users/${username}/historyExams`).once('value');
        let currentHistory = histSnap.val() || [];
        if (!Array.isArray(currentHistory)) currentHistory = Object.values(currentHistory);
        
        const newHistoryRecord = {
            stt: currentHistory.length + 1,
            subject: activeExam.subject,
            time: new Date().toLocaleString('vi-VN'),
            expired: activeExam.expired || "Không giới hạn",
            status: "Đã hoàn thành",
            examId: activeExam.id 
        };
        
        currentHistory.push(newHistoryRecord);
        await database.ref(`users/${username}/historyExams`).set(currentHistory);
        
        window.location.replace('tien-do-cong-viec.html');
    } catch (error) {
        alert("Lỗi nộp bài thi: " + error.message);
    }
}
</script>
</body>
</html>
