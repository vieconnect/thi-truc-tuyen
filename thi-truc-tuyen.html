<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống thi trực tuyến</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .exam-monitor-box { position: fixed; bottom: 20px; right: 20px; width: 180px; height: 135px; background: #222; border: 3px solid #dc3545; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); z-index: 9999; overflow: hidden; display: none; }
        .exam-monitor-box video { width: 100%; height: 100%; object-fit: cover; }
        .monitor-badge { position: absolute; top: 5px; left: 5px; font-size: 10px; padding: 2px 6px; background: rgba(220, 53, 69, 0.85); color: white; border-radius: 4px; font-weight: bold; }
        .monitor-static-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: #ffc107; font-size: 11px; font-weight: bold; text-align: center; padding: 10px; text-transform: uppercase; }
        .timer-box { font-size: 1.25rem; font-weight: bold; padding: 8px 15px; border-radius: 8px; background-color: #fff3cd; color: #856404; border: 1px solid #ffeeba; display: inline-flex; align-items: center; }
        .timer-box.timeout-warning { background-color: #f8d7da; color: #721c24; border-color: #f5c6cb; animation: pulse-border 1s infinite; }
        @keyframes pulse-border { 0% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.4); } 70% { box-shadow: 0 0 0 6px rgba(220, 53, 69, 0); } 100% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0); } }
        #toastContainer { position: fixed; top: 20px; right: 20px; z-index: 100000; width: 350px; }
    </style>
</head>
<body class="bg-light">

<div id="toastContainer"></div>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">VieEdu</a>
    <div class="navbar-nav ms-auto">
        <span class="nav-link text-white me-3" id="welcomeMessage"></span>
        <a class="btn btn-sm btn-outline-light" href="dashboard.html">Về Dashboard</a>
    </div>
  </div>
</nav>

<div class="container mt-5">
    <div class="row">
        <div class="col-md-8 mx-auto">
            <div id="examListWrapper" class="card p-4 shadow-sm mb-4">
                <h4 class="fw-bold text-primary mb-3 text-center">Danh sách Đề Thi được giao</h4>
                <div id="examListContainer" class="list-group">
                    <div class="text-center p-3 text-muted">Đang tìm kiếm bài thi được chỉ định...</div>
                </div>
            </div>
            
            <div id="quizWorkspace" class="card p-4 shadow-sm" style="display: none;">
                <div class="d-flex justify-content-between align-items-start mb-2">
                    <div>
                        <h4 id="workspaceTitle" class="fw-bold text-success mb-1">Tên bài thi</h4>
                        <p class="text-muted small mb-0">Thời gian quy định: <span id="workspaceTime"></span> | Hạn chót: <span id="workspaceExpired"></span></p>
                    </div>
                    <div id="timerContainer" class="timer-box" style="display: none;">
                        <i class="bi bi-clock me-2"></i><span id="countdownTimer">00:00</span>
                    </div>
                </div>
                <hr class="mt-2">
                <div id="questionsContainer"></div>
                <div id="actionBtnContainer" class="mt-3"></div>
            </div>
        </div>
    </div>
</div>

<div class="exam-monitor-box" id="cameraMonitorBox">
    <span class="monitor-badge">● SCREEN LIVE</span>
    <div class="monitor-static-placeholder bg-dark"><span>Hệ thống đang<br>giám sát cửa sổ...</span></div>
    <video id="monitorCameraVideo" autoplay muted playsinline style="display: none;"></video>
</div>
<canvas id="monitorCanvas" style="display: none;"></canvas>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="auth.js"></script>

<script>
let activeExam = null; 
let isExamInProgress = false;
let screenViolationCount = 0;
let examTimerInterval = null;

// Hàm định dạng và làm sạch Email toàn cục để truy cập chuẩn nhánh cơ sở dữ liệu
function getCleanUsername() {
    const currentUser = JSON.parse(localStorage.getItem('currentUser'));
    if (!currentUser) return '';
    if (currentUser.username) return currentUser.username;
    const email = currentUser.email || "";
    return email.replace(/[@.]/g, '_');
}

document.addEventListener('DOMContentLoaded', () => {
    const currentUser = JSON.parse(localStorage.getItem('currentUser'));
    if (!currentUser) {
        window.location.replace('index.html');
        return;
    }

    // ĐIỀU HƯỚNG NẾU LÀ ADMIN TRUY CẬP TRANG THÍ SINH
    if (currentUser.role && currentUser.role.toLowerCase() === 'admin') {
        window.location.replace('admin-users.html');
        return;
    }

    document.getElementById('welcomeMessage').innerText = `Thí sinh: ${currentUser.name}`;
    checkRunningExamState();
});

async function checkRunningExamState() {
    const savedExamId = localStorage.getItem('runningExamId');
    const savedStartTime = localStorage.getItem('runningExamStartTime');
    const savedDuration = localStorage.getItem('runningExamDuration');

    if (savedExamId && savedStartTime && savedDuration) {
        try {
            const examSnapshot = await database.ref(`exams/${savedExamId}`).once('value');
            const examData = examSnapshot.val();

            if (examData) {
                activeExam = {
                    id: savedExamId,
                    subject: examData.subject,
                    time: examData.time || "Không giới hạn",
                    expired: examData.expired,
                    questions: examData.questions || {}
                };

                document.getElementById('examListWrapper').style.display = 'none';
                document.getElementById('cameraMonitorBox').style.display = 'block';
                document.getElementById('quizWorkspace').style.display = 'block';
                document.getElementById('workspaceTitle').innerText = activeExam.subject;
                document.getElementById('workspaceTime').innerText = activeExam.time;
                document.getElementById('workspaceExpired').innerText = activeExam.expired || "Không giới hạn";

                renderQuestions(activeExam.questions);
                startScreenWindowTracker();

                const startTimeMs = parseInt(savedStartTime);
                const durationMinutes = parseInt(savedDuration);
                const currentTimeMs = Date.now();
                const timePassedSeconds = Math.floor((currentTimeMs - startTimeMs) / 1000);
                const totalDurationSeconds = durationMinutes * 60;
                const remainingSeconds = totalDurationSeconds - timePassedSeconds;

                if (remainingSeconds <= 0) {
                    showToast("Thời gian làm bài đã hết! Hệ thống tự động nộp.", "danger");
                    submitExam();
                } else {
                    resumeExamTimer(remainingSeconds);
                }
                return;
            }
        } catch (e) {
            console.error("Lỗi đồng bộ F5:", e);
        }
    }
    renderAssignedExams();
}

async function renderAssignedExams() {
    const userKey = getCleanUsername();
    const container = document.getElementById('examListContainer');
    container.innerHTML = '';
    try {
        const userAssignedSnapshot = await database.ref(`users/${userKey}/assignedExams`).once('value');
        const userAssignedExams = userAssignedSnapshot.val() || {};
        const examIds = Object.keys(userAssignedExams);

        if (examIds.length === 0) {
            container.innerHTML = '<div class="text-center p-3 text-muted">Bạn chưa được giao bài thi nào!</div>';
            return;
        }

        for (const examId of examIds) {
            const userExamState = userAssignedExams[examId];
            const hasDone = userExamState && (userExamState.status === "Đã hoàn thành" || userExamState.submitTime !== undefined);
            const globalExamSnapshot = await database.ref(`exams/${examId}`).once('value');
            const globalExamData = globalExamSnapshot.val();
            if (!globalExamData) continue; 

            let btnHtml = hasDone ? `<span class="badge bg-danger mt-2 p-2 d-inline-block">Đã hoàn thành</span>` : `<button class="btn btn-sm btn-primary mt-2" onclick="startExam('${examId}')">Bắt đầu làm bài</button>`;

            container.insertAdjacentHTML('beforeend', `
                <div class="list-group-item list-group-item-action p-3 mb-2 border rounded">
                    <div class="d-flex w-100 justify-content-between align-items-center">
                        <h6 class="mb-1 fw-bold text-dark">${globalExamData.subject || 'Môn thi không tên'}</h6>
                        <small class="badge bg-secondary text-light">${examId}</small>
                    </div>
                    <p class="mb-1 text-muted small">Thời gian làm bài: ${globalExamData.time || 'Không giới hạn'}</p>
                    ${btnHtml}
                </div>
            `);
        }
    } catch (error) {
        console.error(error);
        container.innerHTML = '<div class="text-center p-3 text-danger">Lỗi kết nối dữ liệu!</div>';
    }
}

async function startExam(examId) {
    const userKey = getCleanUsername();
    const userSnapshot = await database.ref(`users/${userKey}`).once('value');
    const userData = userSnapshot.val();
    const isLocked = userData && userData.isLocked === true;

    try {
        const examSnapshot = await database.ref(`exams/${examId}`).once('value');
        const examData = examSnapshot.val();
        activeExam = { id: examId, subject: examData.subject, time: examData.time, expired: examData.expired, questions: examData.questions || {} };
        
        document.getElementById('examListWrapper').style.display = 'none';
        document.getElementById('quizWorkspace').style.display = 'block';
        document.getElementById('workspaceTitle').innerText = activeExam.subject;
        document.getElementById('workspaceTime').innerText = activeExam.time;
        document.getElementById('workspaceExpired').innerText = activeExam.expired || "Không giới hạn";

        const btnContainer = document.getElementById('actionBtnContainer');

        if (isLocked) {
            document.getElementById('questionsContainer').innerHTML = `
                <div class="alert alert-danger text-center p-4">
                    <i class="bi bi-lock-fill" style="font-size: 2rem;"></i>
                    <h4 class="mt-2">Tài khoản đã bị khóa</h4>
                    <p>Tài khoản này hiện đang bị khóa, do đó bạn sẽ không thể thực hiện bài thi này</p>
                </div>`;
            btnContainer.innerHTML = `<a href="dashboard.html" class="btn btn-secondary w-100"><i class="bi bi-arrow-left"></i> Quay lại Dashboard</a>`;
            document.getElementById('cameraMonitorBox').style.display = 'none';
        } else {
            renderQuestions(activeExam.questions);
            startScreenWindowTracker();
            initExamTimer(activeExam.time, examId);
            document.getElementById('cameraMonitorBox').style.display = 'block';
            btnContainer.innerHTML = `<button class="btn btn-success w-100" onclick="submitExam()">Nộp bài và lưu kết quả</button>`;
        }
    } catch (error) {
        showToast("Lỗi: " + error.message, "danger");
    }
}

function initExamTimer(timeString, examId) {
    if (examTimerInterval) clearInterval(examTimerInterval);
    const timerContainer = document.getElementById('timerContainer');
    const countdownTimer = document.getElementById('countdownTimer');
    let durationMinutes = parseInt(timeString);
    if (isNaN(durationMinutes) || durationMinutes <= 0) { timerContainer.style.display = 'none'; return; }
    localStorage.setItem('runningExamId', examId);
    localStorage.setItem('runningExamStartTime', Date.now().toString());
    localStorage.setItem('runningExamDuration', durationMinutes.toString());
    timerContainer.style.display = 'inline-flex';
    runCountdown(durationMinutes * 60, timerContainer, countdownTimer);
}

function resumeExamTimer(secondsLeft) {
    const timerContainer = document.getElementById('timerContainer');
    const countdownTimer = document.getElementById('countdownTimer');
    timerContainer.style.display = 'inline-flex';
    runCountdown(secondsLeft, timerContainer, countdownTimer);
}

function runCountdown(initialSeconds, container, displayElement) {
    let secondsTime = initialSeconds;
    const update = () => {
        let m = Math.floor(secondsTime / 60), s = secondsTime % 60;
        displayElement.innerText = `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
        if (secondsTime <= 0) { clearInterval(examTimerInterval); clearRunningExamStorage(); submitExam(); }
        secondsTime--;
    };
    update();
    examTimerInterval = setInterval(update, 1000);
}

function clearRunningExamStorage() {
    localStorage.removeItem('runningExamId');
    localStorage.removeItem('runningExamStartTime');
    localStorage.removeItem('runningExamDuration');
}

function startScreenWindowTracker() {
    isExamInProgress = true;
    document.addEventListener('visibilitychange', handleVisibilityViolation);
    window.addEventListener('blur', handleBlurViolation);
}

function stopScreenWindowTracker() {
    isExamInProgress = false;
    document.removeEventListener('visibilitychange', handleVisibilityViolation);
    window.removeEventListener('blur', handleBlurViolation);
    document.getElementById('cameraMonitorBox').style.display = 'none';
    if (examTimerInterval) clearInterval(examTimerInterval);
}

function handleVisibilityViolation() { if (document.visibilityState === 'hidden' && isExamInProgress) processViolationCommit("Thí sinh rời khỏi tab"); }
function handleBlurViolation() { if (isExamInProgress) processViolationCommit("Thí sinh mở cửa sổ khác"); }

async function processViolationCommit(reason) {
    if (!activeExam) return;
    const userKey = getCleanUsername();
    screenViolationCount++;
    showToast(`Cảnh báo vi phạm: ${reason}`, "warning");
    await database.ref(`users/${userKey}/screenViolations`).set(screenViolationCount);
}

function renderQuestions(questions) {
    const container = document.getElementById('questionsContainer');
    container.innerHTML = '';
    Object.keys(questions).forEach((qId, idx) => {
        let optionsHtml = '';
        Object.keys(questions[qId].options).forEach(optKey => {
            optionsHtml += `<div class="form-check mb-2"><input class="form-check-input" type="radio" name="${qId}" value="${optKey}"><label class="form-check-label">${optKey}. ${questions[qId].options[optKey]}</label></div>`;
        });
        container.insertAdjacentHTML('beforeend', `<div class="mb-4 p-3 border-bottom rounded bg-white"><p class="fw-bold">Câu ${idx+1}: ${questions[qId].title}</p>${optionsHtml}</div>`);
    });
}

async function submitExam() {
    if (!activeExam) return;
    const userKey = getCleanUsername();
    
    let selectedAnswers = {};
    document.querySelectorAll('#questionsContainer input[type="radio"]:checked').forEach(elem => {
        selectedAnswers[elem.name] = elem.value;
    });

    let totalQuestions = Object.keys(activeExam.questions).length;
    let correctCount = 0;
    if (totalQuestions > 0) {
        for (let qId in activeExam.questions) {
            if (selectedAnswers[qId] && selectedAnswers[qId] === activeExam.questions[qId].correctAnswer) {
                correctCount++;
            }
        }
    }
    let calculatedScore = totalQuestions > 0 ? (correctCount / totalQuestions) * 10 : 0;
    calculatedScore = Math.round(calculatedScore * 100) / 100;

    const resultPayload = {
        status: "Đã hoàn thành",
        submitTime: new Date().toLocaleString('vi-VN'),
        autoScore: calculatedScore,
        finalScore: calculatedScore,
        selectedAnswers: selectedAnswers, 
        screenViolations: screenViolationCount,
        isPublished: false 
    };

    try {
        stopScreenWindowTracker(); 
        clearRunningExamStorage();

        // Đồng bộ chuẩn hóa ghi dữ liệu theo userKey
        await database.ref(`users/${userKey}/assignedExams/${activeExam.id}`).update(resultPayload);
        await database.ref('users/' + userKey).update({ examStatus: "Đã nộp bài" });

        const histSnap = await database.ref(`users/${userKey}/historyExams`).once('value');
        let currentHistory = histSnap.val() || [];
        if (!Array.isArray(currentHistory)) currentHistory = Object.values(currentHistory);
        
        const newHistoryRecord = {
            ...resultPayload,
            subject: activeExam.subject,
            examId: activeExam.id,
            stt: currentHistory.length + 1
        };
        
        currentHistory.push(newHistoryRecord);
        await database.ref(`users/${userKey}/historyExams`).set(currentHistory);
        
        showToast("Nộp bài thi thành công!", "success");
        setTimeout(() => {
            window.location.replace('tien-do-cong-viec.html');
        }, 1500);

    } catch (error) {
        showToast("Lỗi hệ thống khi nộp bài: " + error.message, "danger");
    }
}
</script>
</body>
</html>
