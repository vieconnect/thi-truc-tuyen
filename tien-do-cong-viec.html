    <script language="JavaScript">
    window.onload = function() {
        document.addEventListener("contextmenu", function(e) {
            e.preventDefault();
        }, false);
        document.addEventListener("keydown", function(e) {
            // "I" key
            if (e.ctrlKey && e.shiftKey && e.keyCode == 73) {
                disabledEvent(e);
            }
            // "J" key
            if (e.ctrlKey && e.shiftKey && e.keyCode == 74) {
                disabledEvent(e);
            }
            // "S" key + macOS
            if (e.keyCode == 83 && (navigator.platform.match("Mac") ? e.metaKey : e.ctrlKey)) {
                disabledEvent(e);
            }
            // "U" key
            if (e.ctrlKey && e.keyCode == 85) {
                disabledEvent(e);
            }
            // "F12" key
            if (event.keyCode == 123) {
                disabledEvent(e);
            }
        }, false);
 
        function disabledEvent(e) {
            if (e.stopPropagation) {
                e.stopPropagation();
            } else if (window.event) {
                window.event.cancelBubble = true;
            }
            e.preventDefault();
            return false;
        }
    };
    </script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script>
document.addEventListener('DOMContentLoaded', async () => {
    const currentUser = JSON.parse(localStorage.getItem('currentUser'));
    if (!currentUser) {
        window.location.replace('index.html');
        return;
    }

    // Định vị chính xác thẻ tbody theo cấu trúc lớp fl-table của bạn
    const tableBody = document.getElementById('contentTableBody'); 
    if(!tableBody) return;

    tableBody.innerHTML = '<tr><td colspan="6" class="text-center" style="color: #666;"><div class="spinner-border spinner-border-sm text-primary me-2"></div> Đang đồng bộ tiến độ hệ thống...</td></tr>';

    try {
        // 1. Tải mảng lịch sử nộp bài (historyExams)
        const historySnap = await database.ref(`users/${currentUser.username}/historyExams`).once('value');
        const historyExams = historySnap.val() || [];

        // 2. Tải thông tin chấm điểm, trạng thái công bố chi tiết từ Admin (exams)
        const scoreSnap = await database.ref(`users/${currentUser.username}/exams`).once('value');
        const adminExamsData = scoreSnap.val() || {};

        // Chuyển dữ liệu sang mảng để xử lý vòng lặp map/forEach
        const records = Array.isArray(historyExams) ? historyExams : Object.values(historyExams);

        if (records.length === 0) {
            tableBody.innerHTML = '<tr><td colspan="6" class="text-center text-muted" style="padding: 20px;">Bạn chưa thực hiện công việc hoặc bài thi nào.</td></tr>';
            return;
        }

        tableBody.innerHTML = '';
        
        records.forEach(record => {
            // Xác định mã bài thi (examId) của dòng hiện tại (Ví dụ: exam_01, exam_02)
            // Nếu cấu trúc payload cũ chưa có examId, hệ thống tự động suy luận thông minh qua thuộc tính STT
            const examId = record.examId || (record.stt === 1 ? "exam_01" : "exam_02");
            const liveExamDetails = adminExamsData[examId];
            
            let scoreDisplayHtml = "";
            
            if (liveExamDetails) {
                if (liveExamDetails.isPublished === true) {
                    // Admin đã ấn nút duyệt công bố kết quả
                    scoreDisplayHtml = `<b style="color: #2e7d32; font-size: 1.1rem;">${liveExamDetails.finalScore}</b> <span style="font-size:0.8rem; color:#777;">/ 10</span>`;
                } else {
                    // Thí sinh đã nộp nhưng Admin chưa duyệt công bố điểm công khai
                    scoreDisplayHtml = `<i style="color: #e65100; font-size: 0.85rem;">Chưa có kết quả (Chờ duyệt)</i>`;
                }
            } else {
                // Phòng trường hợp thí sinh nộp bài dạng mock dữ liệu cũ không có chi tiết bài làm
                scoreDisplayHtml = `<i style="color: #9e9e9e; font-size: 0.85rem;">Chưa có kết quả</i>`;
            }

            const rowHtml = `
                <tr>
                    <td>${record.stt || '-'}</td>
                    <td style="font-weight: bold; text-align: left; padding-left: 15px;">${record.subject || 'N/A'}</td>
                    <td>${record.time || '---'}</td>
                    <td><span style="color: #c62828; font-size: 0.9rem;">${record.expired || '---'}</span></td>
                    <td><span class="badge bg-success" style="padding: 5px 10px; border-radius: 4px; font-size: 0.8rem; background-color: #2e7d32; color: #fff;">✓ ${record.status || 'Đã hoàn thành'}</span></td>
                    <td style="text-align: center; font-weight: bold;">${scoreDisplayHtml}</td>
                </tr>
            `;
            tableBody.insertAdjacentHTML('beforeend', rowHtml);
        });

    } catch (error) {
        console.error("Lỗi đồng bộ dữ liệu fl-table:", error);
        tableBody.innerHTML = '<tr><td colspan="6" class="text-center text-danger" style="padding: 20px;">Lỗi tải dữ liệu tiến độ. Vui lòng làm mới trang!</td></tr>';
    }
});
</script>

          if (btn) {
            const modal = document.querySelector('#staticBackdrop');
            const dialog = modal.querySelector('.modal-dialog');
            const rect = btn.getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            const y = rect.top + rect.height / 2;
            dialog.style.transformOrigin = `${x}px ${y}px`;
          }
        });
